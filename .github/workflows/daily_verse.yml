name: Daily Bible Verse

on:
  schedule:
    # 8:00 по Москве (UTC+3) = 5:00 UTC. Поменяй под себя.
    - cron: "0 3 * * *"
  workflow_dispatch: {}  # позволяет запустить вручную кнопкой "Run workflow"

jobs:
  post-verse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Post verse
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python post_verse.py
